<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHEDIFY - Automated Scheduler</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-animation"></div>
    <div class="container">
        <header>
            <h1>SHEDIFY</h1>
            <p>Automatic Conflict-Free Class & Resource Scheduler</p>
        </header>

        <div class="booking-panel room-card">
            <h2>Book a Room</h2>
            <form id="booking-form">
                <div class="form-group">
                    <label>Course Name</label>
                    <input type="text" id="course_name" placeholder="e.g. DATA202" required>
                </div>
                <div class="form-group">
                    <label>Room</label>
                    <select id="room_id" required>
                        <option value="">Loading rooms...</option>
                    </select>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Start Time</label>
                        <input type="time" id="start_time" required>
                    </div>
                    <div class="form-group">
                        <label>End Time</label>
                        <input type="time" id="end_time" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Expected Students</label>
                    <input type="number" id="expected_students" placeholder="e.g. 45" required>
                </div>
                <button type="submit" class="btn">Confirm Booking</button>
            </form>
            <div id="booking-message" class="message hidden"></div>
        </div>
        
        <main>
            <div id="loader" class="loader">Generating optimal schedule...</div>
            <div id="schedule-grid" class="schedule-grid hidden"></div>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
