<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shedify - Class Scheduling System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🎓 Shedify</h1>
            <p class="subtitle">Automated Class Scheduling System</p>
        </header>

        <div class="main-content">
            <section class="input-section">
                <h2>Add Class Requests</h2>
                <form id="classForm">
                    <div class="form-group">
                        <label for="classId">Class ID *</label>
                        <input type="text" id="classId" required placeholder="e.g., CS101-1">
                    </div>
                    
                    <div class="form-group">
                        <label for="className">Class Name *</label>
                        <input type="text" id="className" required placeholder="e.g., Data Structures">
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label for="startTime">Start Time *</label>
                            <input type="time" id="startTime" required>
                        </div>
                        
                        <div class="form-group">
                            <label for="endTime">End Time *</label>
                            <input type="time" id="endTime" required>
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label for="day">Day *</label>
                            <select id="day" required>
                                <option value="">Select Day</option>
                                <option value="Monday">Monday</option>
                                <option value="Tuesday">Tuesday</option>
                                <option value="Wednesday">Wednesday</option>
                                <option value="Thursday">Thursday</option>
                                <option value="Friday">Friday</option>
                                <option value="Saturday">Saturday</option>
                            </select>
                        </div>
                        
                        <div class="form-group">
                            <label for="roomType">Room Type *</label>
                            <select id="roomType" required>
                                <option value="any">Any</option>
                                <option value="regular">Regular Classroom</option>
                                <option value="lab">Laboratory</option>
                                <option value="seminar_hall">Seminar Hall</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label for="courseCode">Course Code</label>
                            <input type="text" id="courseCode" placeholder="e.g., CS101">
                        </div>
                        
                        <div class="form-group">
                            <label for="instructor">Instructor</label>
                            <input type="text" id="instructor" placeholder="e.g., Dr. Smith">
                        </div>
                    </div>
                    
                    <button type="submit" class="btn btn-primary">Add Class</button>
                </form>
                
                <div class="class-list">
                    <h3>Class Requests (<span id="classCount">0</span>)</h3>
                    <div id="classRequestsList"></div>
                    <div class="actions">
                        <button id="scheduleBtn" class="btn btn-success" disabled>Generate Schedule</button>
                        <button id="clearBtn" class="btn btn-secondary">Clear All</button>
                    </div>
                </div>
            </section>

            <section class="output-section">
                <h2>Schedule Output</h2>
                <div id="scheduleOutput">
                    <p class="placeholder">Add class requests and click "Generate Schedule" to see results.</p>
                </div>
            </section>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
